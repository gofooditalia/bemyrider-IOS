workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - testflight-secrets
      vars:
        GITHUB_RUN_NUMBER: $CM_BUILD_NUMBER
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Setup code signing
        script: |
          KEYCHAIN_PATH=$HOME/Library/Keychains/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          rm /tmp/cert.p12
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          rm /tmp/profile.mobileprovision
      - name: Install CocoaPods dependencies
        script: bundle exec pod install
      - name: Build and upload via Fastlane
        script: bundle exec fastlane beta
    artifacts:
      - build/**/*.ipa
      - build/**/*.dSYM.zip
